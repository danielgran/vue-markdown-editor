name: Publish Vue3 Package to npm

on:
  release:
    types: [published]
  push:
    branches:
      - dev

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
      - name: Set prerelease version (non-main branches only)
        if: github.ref != 'refs/heads/main' && github.event_name == 'push'
        run: |
          BRANCH_NAME="${GITHUB_REF_NAME}"
          # Sanitize: replace slashes and non-alphanumeric chars with hyphens
          SAFE_BRANCH=$(echo "$BRANCH_NAME" | sed 's/[^a-zA-Z0-9]/-/g' | tr '[:upper:]' '[:lower:]')
          SHORT_SHA=$(echo "$GITHUB_SHA" | cut -c1-7)
          BASE_VERSION=$(node -p "require('./package.json').version")
          PRERELEASE_VERSION="${BASE_VERSION}-${SAFE_BRANCH}.${SHORT_SHA}"
          echo "Publishing prerelease version: $PRERELEASE_VERSION"
          npm version "$PRERELEASE_VERSION" --no-git-tag-version

      - name: Publish to npmjs
        run: |
          if [[ "$GITHUB_REF_NAME" != "main" && "$GITHUB_EVENT_NAME" == "push" ]]; then
            npm publish --provenance --access public --tag dev
          else
            npm publish --provenance --access public
          fi
